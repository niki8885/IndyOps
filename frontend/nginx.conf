# HTTP :80 — redirect to HTTPS. With Cloudflare proxy + SSL "Full (strict)" the edge
# connects to the origin on :443; this block only catches direct-to-origin HTTP hits.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS :443 — terminates TLS with the Cloudflare Origin Certificate (mounted from the
# host at /etc/nginx/certs; see docker-compose.yml). 15-year cert, trusted because
# Cloudflare is the edge. Required for SSL mode "Full (strict)".
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
