name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: backend

jobs:
  # -------------------------------------------------------------------------
  # Lint — ruff (pyflakes + syntax), high signal / low noise
  # -------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check app tests

  # -------------------------------------------------------------------------
  # Tests + coverage → Codecov
  # -------------------------------------------------------------------------
  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage + junit
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/junit.xml
          flags: backend

  # -------------------------------------------------------------------------
  # Frontend — vitest tests + coverage + bundle analysis → Codecov
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/indyops-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/indyops-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run vitest with coverage + junit
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-report.junit.xml --coverage
      - name: Build (uploads bundle analysis to Codecov)
        run: npm run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/indyops-ui/coverage/lcov.info
          flags: frontend
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/indyops-ui/test-report.junit.xml
          flags: frontend

  # -------------------------------------------------------------------------
  # Fortran analytics-engine parity — build the native engine and check it
  # still matches the Python oracle. The default `test` job runs with the
  # binary absent (parity auto-skips); this one exercises the native path.
  # -------------------------------------------------------------------------
  fortran-parity:
    name: Fortran engine parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran
      - name: Build analytics-engine + profit-sim + scenario-sim + portfolio-opt
        run: sh build.sh
        working-directory: fortran/analytics-engine
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run analytics-engine parity test
        run: pytest tests/test_analytics_fortran_parity.py
        env:
          ANALYTICS_ENGINE_BIN: ${{ github.workspace }}/fortran/analytics-engine/bin/analytics-engine
      - name: Run profit-sim parity test
        run: pytest tests/test_profit_sim_fortran_parity.py
        env:
          PROFIT_SIM_BIN: ${{ github.workspace }}/fortran/analytics-engine/bin/profit-sim
      - name: Run scenario-sim parity test
        run: pytest tests/test_scenario_sim_fortran_parity.py
        env:
          SCENARIO_SIM_BIN: ${{ github.workspace }}/fortran/analytics-engine/bin/scenario-sim
      - name: Run portfolio-opt parity test
        run: pytest tests/test_portfolio_fortran_parity.py
        env:
          PORTFOLIO_OPT_BIN: ${{ github.workspace }}/fortran/analytics-engine/bin/portfolio-opt

  # -------------------------------------------------------------------------
  # Haskell chain-engine — build, unit tests, and cross-language parity
  # against the Python oracle (the make-vs-buy core, haskell/chain-engine)
  # -------------------------------------------------------------------------
  chain-engine:
    name: Chain engine (Haskell) + parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"

      - name: Build engine + run Haskell tests
        working-directory: haskell/chain-engine
        run: |
          mkdir -p bin build
          ghc -O2 -isrc -iapp -outputdir build app/Main.hs -o bin/chain-engine
          ghc -O2 -isrc -iapp-planner -outputdir build-planner app-planner/Main.hs -o bin/reaction-planner
          ghc -isrc -itests -outputdir build/test tests/Spec.hs -o build/spec
          ./build/spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cross-language parity (Python oracle vs native binary)
        working-directory: backend
        env:
          CHAIN_ENGINE_BIN: ${{ github.workspace }}/haskell/chain-engine/bin/chain-engine
          REACTION_PLANNER_BIN: ${{ github.workspace }}/haskell/chain-engine/bin/reaction-planner
        run: |
          pip install pytest
          pytest tests/test_chain_haskell_parity.py tests/test_reaction_planner_haskell_parity.py --noconftest -q

  # -------------------------------------------------------------------------
  # Haskell risk-engine — build, unit tests, and cross-language parity against
  # the Python oracle (strategy risk-scoring / ranking, haskell/risk-engine)
  # -------------------------------------------------------------------------
  risk-engine:
    name: Risk engine (Haskell) + parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"

      - name: Build engine + run Haskell tests
        working-directory: haskell/risk-engine
        run: |
          mkdir -p bin build
          ghc -O2 -isrc -iapp -outputdir build app/Main.hs -o bin/risk-engine
          ghc -isrc -itests -outputdir build/test tests/Spec.hs -o build/spec
          ./build/spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cross-language parity (Python oracle vs native binary)
        working-directory: backend
        env:
          RISK_ENGINE_BIN: ${{ github.workspace }}/haskell/risk-engine/bin/risk-engine
        run: |
          pip install pytest numpy
          pytest tests/test_risk_engine_haskell_parity.py --noconftest -q

  # -------------------------------------------------------------------------
  # Haskell invention-optimizer — build, unit tests, and cross-language parity
  # against the Python oracle (decryptor × product ranking, haskell/invention-optimizer)
  # -------------------------------------------------------------------------
  invention-optimizer:
    name: Invention optimizer (Haskell) + parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"

      - name: Build engine + run Haskell tests
        working-directory: haskell/invention-optimizer
        run: |
          mkdir -p bin build
          ghc -O2 -isrc -iapp -outputdir build app/Main.hs -o bin/invention-optimizer
          ghc -isrc -itests -outputdir build/test tests/Spec.hs -o build/spec
          ./build/spec

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cross-language parity (Python oracle vs native binary)
        working-directory: backend
        env:
          INVENTION_OPTIMIZER_BIN: ${{ github.workspace }}/haskell/invention-optimizer/bin/invention-optimizer
        run: |
          pip install pytest
          pytest tests/test_invention_optimizer_parity.py --noconftest -q
