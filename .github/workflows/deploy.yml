name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/indyops-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/indyops-frontend

jobs:
  # -------------------------------------------------------------------------
  # 0. Run the test suite first — gates the whole deploy pipeline
  # -------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        run: pytest -q

  # -------------------------------------------------------------------------
  # 1. Build Docker images and push to GHCR
  # -------------------------------------------------------------------------
  build:
    name: Build & Push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # -------------------------------------------------------------------------
  # 2. SSH into Hetzner and restart the stack
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/indyops

            # Pull latest images
            docker compose pull

            # Restart changed containers, remove orphans
            docker compose up -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
