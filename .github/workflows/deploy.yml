name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/indyops-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/indyops-frontend

jobs:
  # -------------------------------------------------------------------------
  # 0. Run the test suite first — gates the whole deploy pipeline
  # -------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        run: pytest -q

      # The Docker build compiles the engine, but only catches compile errors —
      # run the Haskell unit tests so a logic regression also blocks the deploy.
      - name: Set up GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"

      - name: Build + test chain-engine
        working-directory: haskell/chain-engine
        run: |
          mkdir -p bin build
          ghc -O2 -isrc -iapp -outputdir build app/Main.hs -o bin/chain-engine
          ghc -O2 -isrc -iapp-planner -outputdir build-planner app-planner/Main.hs -o bin/reaction-planner
          ghc -isrc -itests -outputdir build/test tests/Spec.hs -o build/spec
          ./build/spec

      - name: Build + test risk-engine
        working-directory: haskell/risk-engine
        run: |
          mkdir -p bin build
          ghc -O2 -isrc -iapp -outputdir build app/Main.hs -o bin/risk-engine
          ghc -isrc -itests -outputdir build/test tests/Spec.hs -o build/spec
          ./build/spec

      - name: Build + test invention-optimizer
        working-directory: haskell/invention-optimizer
        run: |
          mkdir -p bin build
          ghc -O2 -isrc -iapp -outputdir build app/Main.hs -o bin/invention-optimizer
          ghc -isrc -itests -outputdir build/test tests/Spec.hs -o build/spec
          ./build/spec

      # Likewise build the Fortran engines and run their cross-language parity
      # tests, so a logic regression (not just a compile error) blocks the deploy
      # before the engines ship in the image.
      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Build analytics-engine + profit-sim
        working-directory: fortran/analytics-engine
        run: sh build.sh

      - name: Run analytics-engine parity test
        working-directory: backend
        run: pytest tests/test_analytics_fortran_parity.py
        env:
          ANALYTICS_ENGINE_BIN: ${{ github.workspace }}/fortran/analytics-engine/bin/analytics-engine

      - name: Run profit-sim parity test
        working-directory: backend
        run: pytest tests/test_profit_sim_fortran_parity.py
        env:
          PROFIT_SIM_BIN: ${{ github.workspace }}/fortran/analytics-engine/bin/profit-sim

      - name: Run risk-engine parity test
        working-directory: backend
        run: pytest tests/test_risk_engine_haskell_parity.py
        env:
          RISK_ENGINE_BIN: ${{ github.workspace }}/haskell/risk-engine/bin/risk-engine

      - name: Run invention-optimizer parity test
        working-directory: backend
        run: pytest tests/test_invention_optimizer_parity.py
        env:
          INVENTION_OPTIMIZER_BIN: ${{ github.workspace }}/haskell/invention-optimizer/bin/invention-optimizer

      - name: Run reaction-planner parity test
        working-directory: backend
        run: pytest tests/test_reaction_planner_haskell_parity.py
        env:
          REACTION_PLANNER_BIN: ${{ github.workspace }}/haskell/chain-engine/bin/reaction-planner

  # -------------------------------------------------------------------------
  # 1. Build Docker images and push to GHCR
  # -------------------------------------------------------------------------
  build:
    name: Build & Push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .                       # repo root: image compiles the sibling haskell/ engine
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # -------------------------------------------------------------------------
  # 2. SSH into Hetzner and restart the stack
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/indyops/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/indyops

            # Pull latest images
            docker compose pull

            # Restart changed containers, remove orphans
            docker compose up -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
