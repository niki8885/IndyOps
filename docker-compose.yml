services:

  db:
    # TimescaleDB (Postgres 16 + timescaledb extension). On the first deploy with
    # this image the API container converts track_prices / market_index_snapshots
    # into hypertables (migrate_data). ⚠ TAKE A pg_dump BACKUP BEFORE DEPLOYING.
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-indyops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-indyops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-indyops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/niki8885/indyops-backend:latest
    restart: unless-stopped
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER:-indyops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-indyops}
      SECRET_KEY: ${SECRET_KEY}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      CALLBACK_URL: ${CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # Background collectors (indices / tracking / SDE / ESI) — out of the API process.
  worker:
    image: ghcr.io/niki8885/indyops-backend:latest
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER:-indyops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-indyops}
      SECRET_KEY: ${SECRET_KEY}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      CALLBACK_URL: ${CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL:-}
      RUN_DB_BOOTSTRAP: "0"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - internal

  frontend:
    image: ghcr.io/niki8885/indyops-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
