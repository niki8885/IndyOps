services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-indyops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-indyops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-indyops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/niki8885/indyops-backend:latest
    restart: unless-stopped
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER:-indyops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-indyops}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/niki8885/indyops-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
